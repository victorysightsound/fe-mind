name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validation:
    name: Validation (${{ matrix.lane }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: release-gate
            run: scripts/run-release-gate.sh
          - lane: default-features
            run: cargo test
          - lane: full-features
            run: cargo test --features full
          - lane: docs
            run: cargo doc --features full --no-deps
          - lane: release-preflight
            run: scripts/run-release-preflight.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run validation lane
        env:
          FEMIND_SKIP_PRACTICAL_EVAL: "1"
        run: ${{ matrix.run }}

  cuda-smoke:
    name: CUDA smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, cuda]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run CUDA smoke
        run: scripts/run-cuda-smoke.sh
